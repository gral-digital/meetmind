<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MeetMind — Microphone access</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      max-width: 420px;
      padding: 32px;
      background: #16213e;
      border-radius: 12px;
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 20px; color: #fff; }
    p { margin: 0 0 20px; font-size: 14px; line-height: 1.5; color: #a0a0b8; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MeetMind needs your microphone</h1>
    <p id="msg">Click the button below and accept the Chrome prompt so MeetMind can transcribe your voice.</p>
    <button id="btn">Grant microphone access</button>
  </div>
  <script src="permission.js"></script>
</body>
</html>

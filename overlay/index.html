<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      background: rgba(12, 12, 20, 0.94);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(40px) saturate(180%);
      position: relative;
      overflow: hidden;
    }

    /* ---- Titlebar ---- */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      cursor: grab;
    }

    .titlebar:active { cursor: grabbing; }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.2px;
    }

    .status-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
      letter-spacing: 0.2px;
      transition: all 0.4s ease;
    }

    .status-badge.waiting {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.3);
    }

    .status-badge.connected {
      background: rgba(74, 222, 128, 0.1);
      color: #5ee89c;
    }

    .status-badge.connected::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #5ee89c;
      margin-right: 6px;
      vertical-align: middle;
      animation: livePulse 2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(94, 232, 156, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(94, 232, 156, 0); }
    }

    /* ---- Separator ---- */
    .separator {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.06) 20%, rgba(255, 255, 255, 0.06) 80%, transparent 100%);
      margin: 0 18px;
    }

    /* ---- Tab bar ---- */
    .tab-bar {
      display: flex;
      padding: 10px 18px 0;
      gap: 2px;
    }

    .tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab svg {
      width: 13px;
      height: 13px;
      opacity: 0.5;
      transition: opacity 0.25s ease;
    }

    .tab.active {
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab.active svg { opacity: 0.85; }

    .tab:hover:not(.active) {
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.02);
    }

    /* ---- Panels ---- */
    .panel {
      flex: 1;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }

    .panel.active { display: flex; }

    /* ---- Transcript ---- */
    .transcript-panel {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    .transcript-line {
      padding: 10px 0;
      font-size: 12.5px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      animation: fadeUp 0.25s ease-out;
    }

    .transcript-line:last-child { border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .transcript-line .speaker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .transcript-line .speaker {
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .transcript-line .speaker.s0 { color: rgba(162, 155, 254, 0.8); }
    .transcript-line .speaker.s1 { color: rgba(94, 232, 156, 0.8); }
    .transcript-line .speaker.s2 { color: rgba(251, 191, 36, 0.8); }
    .transcript-line .speaker.s3 { color: rgba(248, 113, 113, 0.8); }

    .transcript-line .time {
      color: rgba(255, 255, 255, 0.15);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ---- Suggestions ---- */
    .suggestions-panel {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .suggestion-card {
      padding: 14px 16px;
      border-radius: 10px;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
      transition: opacity 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .suggestion-card.response {
      background: rgba(94, 232, 156, 0.06);
      border: 1px solid rgba(94, 232, 156, 0.1);
    }

    .suggestion-card.question {
      background: rgba(162, 155, 254, 0.06);
      border: 1px solid rgba(162, 155, 254, 0.1);
    }

    .suggestion-card.insight {
      background: rgba(251, 191, 36, 0.06);
      border: 1px solid rgba(251, 191, 36, 0.08);
    }

    .suggestion-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .suggestion-header svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .suggestion-type {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .response .suggestion-header svg { color: #5ee89c; }
    .response .suggestion-type { color: rgba(94, 232, 156, 0.7); }

    .question .suggestion-header svg { color: #a29bfe; }
    .question .suggestion-type { color: rgba(162, 155, 254, 0.7); }

    .insight .suggestion-header svg { color: #fbbf24; }
    .insight .suggestion-type { color: rgba(251, 191, 36, 0.7); }

    .suggestion-text {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.82);
      letter-spacing: -0.1px;
    }

    /* History divider */
    .history-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .history-divider::before,
    .history-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.04);
    }

    .history-divider span {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.15);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 500;
    }

    /* ---- Empty state ---- */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      color: rgba(255, 255, 255, 0.08);
    }

    .empty-state p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
      line-height: 1.5;
    }

    .empty-state p:first-of-type {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 500;
    }

    /* ---- Footer ---- */
    .footer {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shortcut-hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    kbd {
      background: rgba(255, 255, 255, 0.04);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 9px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.2);
    }

    /* ---- Resize handle ---- */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .container:hover .resize-handle { opacity: 1; }

    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid rgba(255, 255, 255, 0.12);
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.12);
    }

    /* ---- Badge ---- */
    .suggestion-badge {
      background: rgba(124, 108, 240, 0.9);
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      animation: badgeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes badgeIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.06); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.12); }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar interactive">
      <div class="titlebar-left">
        <div class="logo">
          <img src="logo.png" alt="MeetMind">
        </div>
        <span class="title">G's Notetaker</span>
      </div>
      <span class="status-badge waiting" id="statusBadge">Waiting</span>
    </div>

    <div class="separator"></div>

    <div class="tab-bar interactive">
      <div class="tab active" id="tabSuggestions" data-panel="suggestions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Suggestions
      </div>
      <div class="tab" id="tabTranscript" data-panel="transcript">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Transcript
      </div>
    </div>

    <div class="panel active" id="panelSuggestions">
      <div class="suggestions-panel" id="suggestions">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
          <p>Waiting for audio</p>
          <p>Open the Chrome extension and start listening</p>
        </div>
      </div>
    </div>

    <div class="panel" id="panelTranscript">
      <div class="transcript-panel" id="transcript">
        <div class="empty-state" id="transcriptEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>No transcript yet</p>
          <p>Live conversation will appear here</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="shortcut-hint">
        <kbd>Cmd</kbd> <kbd>Shift</kbd> <kbd>M</kbd> to toggle
      </div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    const WS_URL = "ws://localhost:7778";
    let ws = null;
    let reconnectTimer = null;
    let allTranscriptLines = [];
    let suggestionHistory = [];
    let newSuggestionCount = 0;

    // SVG icons for suggestion types
    const ICONS = {
      response: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>`,
      question: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>`,
      insight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>`,
    };

    const TYPE_LABELS = {
      response: "Suggested Response",
      question: "Ask This",
      insight: "Talking Point",
    };

    // --- Tab switching ---
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("panel" + capitalize(tab.dataset.panel)).classList.add("active");

        if (tab.dataset.panel === "suggestions") {
          newSuggestionCount = 0;
          updateTabBadge();
        }
      });
    });

    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // --- WebSocket ---
    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (event) => {
        handleMessage(JSON.parse(event.data));
      };

      ws.onclose = () => {
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => { ws.close(); };
    }

    function handleMessage(data) {
      switch (data.type) {
        case "status": updateStatus(data.status); break;
        case "transcript": updateTranscript(data); break;
        case "suggestions": renderSuggestions(data.suggestions); break;
      }
    }

    function updateStatus(status) {
      const badge = document.getElementById("statusBadge");
      if (status === "connected") {
        badge.textContent = "Live";
        badge.className = "status-badge connected";
      } else {
        badge.textContent = "Waiting";
        badge.className = "status-badge waiting";
      }
    }

    // --- Transcript ---
    function updateTranscript(data) {
      if (!data.isFinal) return;

      const el = document.getElementById("transcript");
      const empty = document.getElementById("transcriptEmpty");
      if (empty) empty.remove();

      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const speakerNum = data.speaker !== null ? data.speaker : 0;
      const label = data.speaker !== null ? `Speaker ${data.speaker + 1}` : "Speaker";

      const line = document.createElement("div");
      line.className = "transcript-line";
      line.innerHTML = `
        <div class="speaker-row">
          <span class="speaker s${speakerNum % 4}">${escapeHtml(label)}</span>
          <span class="time">${time}</span>
        </div>
        ${escapeHtml(data.text)}
      `;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;

      allTranscriptLines.push({ speaker: label, text: data.text, time });
    }

    // --- Suggestions ---
    function renderSuggestions(suggestions) {
      const container = document.getElementById("suggestions");

      if (suggestionHistory.length > 6) {
        suggestionHistory = suggestionHistory.slice(-6);
      }

      container.innerHTML = "";

      suggestions.forEach((s) => {
        container.appendChild(createSuggestionCard(s, false));
      });

      if (suggestionHistory.length > 0) {
        const divider = document.createElement("div");
        divider.className = "history-divider";
        divider.innerHTML = "<span>Previous</span>";
        container.appendChild(divider);

        suggestionHistory.forEach((s) => {
          container.appendChild(createSuggestionCard(s, true));
        });
      }

      suggestionHistory.push(...suggestions);

      const suggestionsTabActive = document.getElementById("tabSuggestions").classList.contains("active");
      if (!suggestionsTabActive) {
        newSuggestionCount += suggestions.length;
        updateTabBadge();
      }

      container.scrollTop = 0;
    }

    function createSuggestionCard(s, isHistory) {
      const card = document.createElement("div");
      card.className = `suggestion-card ${s.type}`;
      if (isHistory) card.style.opacity = "0.35";
      card.innerHTML = `
        <div class="suggestion-header">
          ${ICONS[s.type] || ""}
          <span class="suggestion-type">${TYPE_LABELS[s.type] || s.type}</span>
        </div>
        <div class="suggestion-text">${escapeHtml(s.text)}</div>
      `;
      return card;
    }

    function updateTabBadge() {
      const tab = document.getElementById("tabSuggestions");
      const existing = tab.querySelector(".suggestion-badge");
      if (existing) existing.remove();

      if (newSuggestionCount > 0) {
        const badge = document.createElement("span");
        badge.className = "suggestion-badge";
        badge.textContent = newSuggestionCount;
        tab.appendChild(badge);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Dragging ---
    let isDragging = false;
    const titlebar = document.querySelector(".titlebar");

    titlebar.addEventListener("mousedown", (e) => {
      isDragging = true;
      ipcRenderer.send("drag-start", { mouseX: e.screenX, mouseY: e.screenY });
    });

    document.addEventListener("mousemove", (e) => {
      if (isDragging) {
        ipcRenderer.send("drag-move", { mouseX: e.screenX, mouseY: e.screenY });
      }
    });

    document.addEventListener("mouseup", () => {
      if (isDragging) {
        isDragging = false;
        ipcRenderer.send("drag-end");
      }
    });

    // --- Resizing ---
    let isResizing = false;
    const resizeHandle = document.getElementById("resizeHandle");

    resizeHandle.addEventListener("mousedown", (e) => {
      isResizing = true;
      ipcRenderer.send("resize-start", { mouseX: e.screenX, mouseY: e.screenY });
      e.stopPropagation();
    });

    document.addEventListener("mousemove", (e) => {
      if (isResizing) {
        ipcRenderer.send("resize-move", { mouseX: e.screenX, mouseY: e.screenY });
      }
    });

    document.addEventListener("mouseup", () => {
      if (isResizing) {
        isResizing = false;
        ipcRenderer.send("resize-end");
      }
    });

    connect();
  </script>
</body>
</html>
